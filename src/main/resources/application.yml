spring:
  application:
    name: report
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

server:
  port: 8090

report:
  python:
    base-url: http://localhost:8091
    timeout: 60s
